server:
  port: 9093
  tomcat:
    # 显式指定嵌入式 Tomcat 工作目录，避免启动环境缺少 TEMP/TMP 时回退到 C:\WINDOWS 导致无权限创建临时目录。
    basedir: ${TOMCAT_BASEDIR:${user.home}/.competitor-agent/tomcat}
    document-root: ${TOMCAT_DOCBASE:${user.home}/.competitor-agent/tomcat-docbase}

spring:
  application:
    name: competitor-agent
  profiles:
    active: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: postgres
    url: jdbc:postgresql://127.0.0.1:5432/ecommerce_agent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:16379}
      database: ${REDIS_DATABASE:0}
      timeout: 3s

rocketmq:
  enabled: true
  required: true
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:competitor-agent-workflow-producer}
    send-message-timeout-millis: 3000
  consumer:
    group: ${ROCKETMQ_CONSUMER_GROUP:competitor-agent-workflow-consumer}
  workflow:
    topic: ${ROCKETMQ_WORKFLOW_TOPIC:task-workflow-events}
    dispatch-tag: TASK_EXECUTION_REQUESTED
    lifecycle-tag: NODE_LIFECYCLE
    outbox:
      scan-interval: 5s
      max-retries: 6
      batch-size: 20

ai:
  active-provider: deepseek
  model-name: deepseek-v4-pro
  max-tokens: 4096
  temperature: 0.3
  timeout-seconds: 120
  providers:
    deepseek:
      url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
    enable-footer: false
    enable-footer-custom: true
    footer-custom-content: "AI 竞品分析 Agent 协作系统 | Copyright 2026"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs

playwright:
  browser: chromium
  # 默认使用 Playwright 托管的纯 Chromium，避免系统 Edge 弹窗、账号、更新和 channel 查找差异影响后台采集。
  channel:
  # 当前显式绑定本机已安装的 Playwright Chromium，避免 channel 查找和浏览器缓存目录差异影响后台采集。
  executable-path: D:/Aplaywright/chromium-1117/chrome-win/chrome.exe
  headless: true
  timeout-millis: 30000
  # 启动期不直接 launch 浏览器，避免 IDE/Windows 下 Playwright driver 管道偶发断开时输出误导性 ERROR；运行期会按需启动。
  startup-warmup-enabled: ${PLAYWRIGHT_STARTUP_WARMUP_ENABLED:false}
  # 定时健康检查默认只检查已有浏览器，不在空实例时主动预热，避免后台周期性触发 Playwright driver 管道异常。
  health-check-warmup-enabled: ${PLAYWRIGHT_HEALTH_CHECK_WARMUP_ENABLED:false}
  screenshot-on-collect: false
  health-check-interval-millis: 60000
  health-check-initial-delay-millis: 15000

collector:
  max-pages-per-competitor: 5
  page-timeout-seconds: 30
  user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

github-api:
  enabled: ${GITHUB_API_ENABLED:false}
  endpoint: ${GITHUB_API_ENDPOINT:https://api.github.com}
  api-token: ${GITHUB_API_TOKEN:}
  timeout-seconds: 15
  max-retries: 2

collection:
  jina-reader:
    enabled: true
    endpoint: https://r.jina.ai/http://
    # 为空时继续走 Jina Reader 免费端点；只有显式配置后才附带 Bearer 认证头，
    # 该 token 只影响速率额度与访问权限，不改变轻量正文采集主逻辑。
    bearer-token: ${JINA_READER_BEARER_TOKEN:}
    timeout-seconds: 20
    max-retries: 2
    minimum-content-length: 160
  rss-feed:
    # 当前 RSS owner 只处理“显式 feed URL -> RSS executor”这一条链路，
    # 普通新闻文章 URL 仍走网页采集主链路；feed seed、订阅监控、cursor、replay 不在当前整改范围，后续归 Wave 11。
    enabled: true
    timeout-seconds: 15
    max-retries: 2
    max-items-per-feed: 5
    fail-fast-on-non-feed-content: true

source-discovery:
  search:
    provider-order:
      - qianfan
      - serpapi
      - browserPreview
      - http
    providers:
      qianfan:
        enabled: true
        fail-open: true
      serpapi:
        enabled: true
        fail-open: true
      browserpreview:
        enabled: true
        fail-open: true
      http:
        enabled: true
        fail-open: true
    primary-candidate-threshold: 1
    run-auxiliary-when-primary-satisfied: false
    # 这里控制的是“规划期浏览器预览补源”是否参与 provider 栈，
    # 不等于运行期 search.browser.enabled；即使这里关闭，运行期浏览器搜索仍可能可用。
    browser-preview-enabled: true
    endpoint: ${SEARCH_API_ENDPOINT:}
    request-method: ${SEARCH_API_REQUEST_METHOD:GET}
    api-key: ${SEARCH_API_KEY:}
    api-key-header: ${SEARCH_API_KEY_HEADER:Authorization}
    api-key-prefix: ${SEARCH_API_KEY_PREFIX:Bearer }
    query-param: ${SEARCH_API_QUERY_PARAM:q}
    limit-param: ${SEARCH_API_LIMIT_PARAM:limit}
    results-per-scope: 5
    timeout-seconds: 15
    max-retries: 2
    results-path: ${SEARCH_API_RESULTS_PATH:results}
    title-field: ${SEARCH_API_TITLE_FIELD:title}
    url-field: ${SEARCH_API_URL_FIELD:url}
    snippet-field: ${SEARCH_API_SNIPPET_FIELD:snippet}
    published-at-field: ${SEARCH_API_PUBLISHED_AT_FIELD:publishedAt}

search:
  mode: HYBRID
  source-catalog:
    families:
      official:
        enabled: true
        role: PRIMARY_VERTICAL
        preferred-web-render-hint: LIGHTWEIGHT
        expected-block-types:
          - PRICING_BLOCK
          - DOCUMENTATION_OUTLINE
          - JSON_LD_METADATA
        source-types:
          - OFFICIAL
          - PRICING
          - DOCS
        content-scopes:
          - PRODUCT_PAGE
          - PRICING
          - DOCUMENTATION
        direct-path-templates:
          - /
          - /pricing
          - /docs
          - /documentation
          - /help
        primary-tools:
          - WEB_SCRAPER
          - JINA_READER
        auxiliary-tools:
          - PUBLIC_SEARCH
        update-policy:
          mode: DAILY_INCREMENTAL
          interval: PT24H
        query-templates:
          - search-official
          - search-official-domain
          - search-pricing-primary
          - search-docs-primary
      news:
        enabled: true
        role: PRIMARY_VERTICAL
        preferred-web-render-hint: LIGHTWEIGHT
        expected-block-types:
          - ARTICLE_BODY
          - JSON_LD_METADATA
        source-types:
          - NEWS
        content-scopes:
          - PRODUCT_RELEASE
          - FUNDING
          - PARTNERSHIP
        # 这里声明的是“news family 遇到显式 feed URL 时由 RSS owner 处理”，
        # 不是说当前系统已经具备完整的 RSS 订阅/主动发现体系；普通新闻 URL 仍走网页采集主链路。
        primary-tools:
          - RSS
        auxiliary-tools:
          - PUBLIC_SEARCH
        tool-provider-keys:
          RSS: rss
          PUBLIC_SEARCH: qianfan
        update-policy:
          mode: REALTIME_RSS_AND_SCHEDULED_SWEEP
          interval: PT1H
        query-templates:
          - search-news-primary
          - search-news-secondary
      github:
        enabled: true
        role: PRIMARY_VERTICAL
        preferred-web-render-hint: FULL_RENDER
        expected-block-types:
          - RELEASE_NOTES
          - JSON_LD_METADATA
        source-types:
          - GITHUB
          - OPEN_SOURCE
        content-scopes:
          - REPOSITORY
          - STAR_TREND
          - RELEASE
        primary-tools:
          - GITHUB_API
        auxiliary-tools:
          - PUBLIC_SEARCH
        tool-provider-keys:
          GITHUB_API: github
        update-policy:
          mode: DAILY_API_POLLING
          interval: PT24H
        query-templates:
          - search-github-repository
          - search-github-release
  engines:
    bing:
      name: Bing
      base-url: https://www.bing.com/search
      query-param: q
      enabled: true
    baidu:
      name: 百度
      base-url: https://www.baidu.com/s
      query-param: wd
      enabled: true
    google:
      name: Google
      base-url: https://www.google.com/search
      query-param: q
      enabled: false
  browser:
    enabled: true
    engine: baidu
    fallback-engines:
      - bing
    verify-result-page: true
    max-results-per-query: 5
    max-open-result-pages: 3
    result-page-timeout-millis: 8000
    max-content-length-per-page: 500
    max-retries: 2
    min-interval-millis: 3000
    max-searches-per-task: 10
    page-timeout-millis: 15000
    continue-on-browser-unavailable: true
    continue-on-search-timeout: true
    continue-on-page-collect-failure: true
    recover-partial-content-on-timeout: true
    stealth-enabled: true
    locale: zh-CN
    timezone-id: Asia/Shanghai
    viewport-width: 1440
    viewport-height: 900
    short-body-threshold: 120
    minimum-primary-result-count: 1
    suspect-blocked-body-threshold: 40
    user-agents:
      - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
      - "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_4) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.4 Safari/605.1.15"
      - "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
      - "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:124.0) Gecko/20100101 Firefox/124.0"
    blocked-signals:
      - captcha
      - unusual traffic
      - verify you are human
      - access denied
      - robot check
      - security check
    blocked-url-keywords:
      - /login
      - /signin
      - /verify
      - /captcha
      - /challenge

serpapi:
  api-key: ${SERPAPI_API_KEY:}
  endpoint: https://serpapi.com/search
  default-engine: google

qianfan-search:
  api-key: ${QIANFAN_API_KEY:}
  endpoint: https://qianfan.baidubce.com/v2/ai_search/web_search
  default-engine: baidu

task:
  rag:
    chunk-size: 600
    chunk-overlap: 80
  runtime:
    redis:
      snapshot-ttl: 12h
      runtime-ttl: 12h
      task-lock-ttl: 30m
      node-lock-ttl: 10m

knowledge:
  connector-runtime:
    enabled: false

logging:
  level:
    root: INFO
    cn.bugstack.competitoragent: DEBUG
    dev.langchain4j: DEBUG
    com.microsoft.playwright: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ./logs/competitor-agent.log
    max-size: 10MB
    max-history: 7

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    driver-class-name: org.h2.Driver
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:competitor-agent-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 4
      minimum-idle: 1
      pool-name: CompetitorAgentTestPool
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      host: 127.0.0.1
      port: 16379
      database: 15
      timeout: 1s

rocketmq:
  enabled: false
  required: false
  name-server:
  producer:
    group: competitor-agent-workflow-producer-test
  consumer:
    group: competitor-agent-workflow-consumer-test
  workflow:
    topic: task-workflow-events-test
    dispatch-tag: TASK_EXECUTION_REQUESTED
    lifecycle-tag: NODE_LIFECYCLE
    outbox:
      scan-interval: 5s
      max-retries: 2
      batch-size: 10

playwright:
  browser: chromium
  channel:
  executable-path:
  headless: true
  timeout-millis: 10000
  startup-warmup-enabled: false
  health-check-warmup-enabled: false
  screenshot-on-collect: false
  health-check-interval-millis: 60000
  health-check-initial-delay-millis: 60000

collector:
  max-pages-per-competitor: 5
  page-timeout-seconds: 15
  user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

search:
  mode: HYBRID
  source-catalog:
    families:
      github:
        # test profile 的主目标是验证工作流、控制器与编排语义，
        # 这批用例不验证真实 GitHub owner，因此显式关闭 github family，
        # 避免 SearchCapabilityReadinessGuard 因缺少正式 token 在启动阶段诚实失败。
        enabled: false
  browser:
    enabled: true
    engine: bing
    fallback-engines:
      - baidu
    verify-result-page: true
    max-results-per-query: 5
    max-open-result-pages: 3
    max-retries: 2
    min-interval-millis: 3000
    max-searches-per-task: 10
    page-timeout-millis: 15000
    continue-on-browser-unavailable: true
    continue-on-search-timeout: true
    continue-on-page-collect-failure: true
    recover-partial-content-on-timeout: true
    stealth-enabled: true
    locale: zh-CN
    timezone-id: Asia/Shanghai
    viewport-width: 1440
    viewport-height: 900
    short-body-threshold: 120
    minimum-primary-result-count: 1
    suspect-blocked-body-threshold: 40

source-discovery:
  search:
    provider-order:
      - qianfan
      - serpapi
      - browserPreview
      - http
    providers:
      qianfan:
        enabled: true
        fail-open: true
      serpapi:
        enabled: true
        fail-open: true
      browserpreview:
        enabled: false
        fail-open: true
      http:
        enabled: true
        fail-open: true
    primary-candidate-threshold: 1
    run-auxiliary-when-primary-satisfied: false
    # prod 这里显式关闭的是“规划期 browser preview provider”，
    # 不是运行期浏览器搜索总开关；运行期是否可用仍由 search.browser.enabled 决定。
    browser-preview-enabled: false
    results-per-scope: 5
    timeout-seconds: 15
    max-retries: 2

logging:
  level:
    root: INFO
    cn.bugstack.competitoragent: INFO
    com.microsoft.playwright: ERROR

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ragent}?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 20
      minimum-idle: 5
      pool-name: RagentHikariPool
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

rocketmq:
  enabled: true
  required: true
  name-server: 127.0.0.1:9876
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:competitor-agent-workflow-producer}
    send-message-timeout-millis: 3000
  consumer:
    group: ${ROCKETMQ_CONSUMER_GROUP:competitor-agent-workflow-consumer}
  workflow:
    topic: ${ROCKETMQ_WORKFLOW_TOPIC:task-workflow-events}
    dispatch-tag: TASK_EXECUTION_REQUESTED
    lifecycle-tag: NODE_LIFECYCLE
    outbox:
      scan-interval: 5s
      max-retries: 6
      batch-size: 20
