server:
  port: 9093

spring:
  application:
    name: competitor-agent
  profiles:
    active: dev

  # ==================== 数据源配置 ====================
  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: postgres
    url: jdbc:postgresql://127.0.0.1:5432/ecommerce_agent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  # ==================== JPA 配置 ====================
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate # Flyway 管理表结构，JPA 只做校验
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

  # ==================== Flyway 配置 ====================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true # 禁止自动清理数据库

  # ==================== Jackson 配置 ====================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ==================== AI 提供商配置 ====================
ai:
  active-provider: deepseek
  model-name: deepseek-v4-pro
  max-tokens: 4096
  temperature: 0.3
  timeout-seconds: 120
  providers:
    #    ollama:
    #      url: http://localhost:11434
    #      endpoints:
    #        chat: /v1/chat/completions
    #        embedding: /v1/embeddings
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    deepseek:
      url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings

# ==================== Knife4j API 文档配置 ====================
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
    enable-footer: false
    enable-footer-custom: true
    footer-custom-content: "AI 竞品分析 Agent 协作系统 | Copyright 2026"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs

playwright:
  browser: chromium
  channel: msedge
  headless: false
  timeout-millis: 30000
  screenshot-on-collect: false
  health-check-interval-millis: 60000
  health-check-initial-delay-millis: 15000

# ==================== 采集配置 ====================
collector:
  max-pages-per-competitor: 5
  page-timeout-seconds: 30
  user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# ==================== 搜索式补源配置 ====================
source-discovery:
  search:
    browser-preview-enabled: true
    endpoint: ${SEARCH_API_ENDPOINT:}
    request-method: ${SEARCH_API_REQUEST_METHOD:GET}
    api-key: ${SEARCH_API_KEY:}
    api-key-header: ${SEARCH_API_KEY_HEADER:Authorization}
    api-key-prefix: ${SEARCH_API_KEY_PREFIX:Bearer }
    query-param: ${SEARCH_API_QUERY_PARAM:q}
    limit-param: ${SEARCH_API_LIMIT_PARAM:limit}
    results-per-scope: 5
    timeout-seconds: 15
    max-retries: 2
    results-path: ${SEARCH_API_RESULTS_PATH:results}
    title-field: ${SEARCH_API_TITLE_FIELD:title}
    url-field: ${SEARCH_API_URL_FIELD:url}
    snippet-field: ${SEARCH_API_SNIPPET_FIELD:snippet}
    published-at-field: ${SEARCH_API_PUBLISHED_AT_FIELD:publishedAt}

search:
  mode: HYBRID
  engines:
    bing:
      name: Bing
      base-url: https://www.bing.com/search
      query-param: q
      enabled: true
    baidu:
      name: 百度
      base-url: https://www.baidu.com/s
      query-param: wd
      enabled: true
    google:
      name: Google
      base-url: https://www.google.com/search
      query-param: q
      enabled: false
  browser:
    enabled: true
    engine: baidu
    fallback-engines:
      - bing
    verify-result-page: true
    max-results-per-query: 5
    max-open-result-pages: 3
    result-page-timeout-millis: 8000
    max-content-length-per-page: 500
    max-retries: 2
    min-interval-millis: 3000
    max-searches-per-task: 10
    page-timeout-millis: 15000
    continue-on-browser-unavailable: true
    continue-on-search-timeout: true
    continue-on-page-collect-failure: true
    recover-partial-content-on-timeout: true
    user-agents:
      - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
      - "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_4) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.4 Safari/605.1.15"
      - "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
      - "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:124.0) Gecko/20100101 Firefox/124.0"
    blocked-signals:
      - captcha
      - unusual traffic
      - verify you are human
      - access denied
      - robot check

serpapi:
  api-key: ${SERPAPI_API_KEY:}
  endpoint: https://serpapi.com/search
  default-engine: google

qianfan-search:
  api-key: ${QIANFAN_API_KEY:}
  endpoint: https://qianfan.baidubce.com/v2/ai_search/web_search
  default-engine: baidu

# ==================== 日志配置 ====================
logging:
  level:
    root: INFO
    cn.bugstack.competitoragent: DEBUG
    dev.langchain4j: DEBUG
    com.microsoft.playwright: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ./logs/competitor-agent.log
    max-size: 10MB
    max-history: 7

---
# ==================== 测试环境配置 ====================
spring:
  config:
    activate:
      on-profile: test
  datasource:
    driver-class-name: org.h2.Driver
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:competitor-agent-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 4
      minimum-idle: 1
      pool-name: CompetitorAgentTestPool
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false

playwright:
  browser: chromium
  channel:
  headless: true
  timeout-millis: 10000
  screenshot-on-collect: false
  health-check-interval-millis: 60000
  health-check-initial-delay-millis: 60000

collector:
  max-pages-per-competitor: 5
  page-timeout-seconds: 15
  user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

search:
  mode: HYBRID
  browser:
    enabled: true
    engine: bing
    fallback-engines:
      - baidu
    verify-result-page: true
    max-results-per-query: 5
    max-open-result-pages: 3
    max-retries: 2
    min-interval-millis: 3000
    max-searches-per-task: 10
    page-timeout-millis: 15000
    continue-on-browser-unavailable: true
    continue-on-search-timeout: true
    continue-on-page-collect-failure: true
    recover-partial-content-on-timeout: true

source-discovery:
  search:
    browser-preview-enabled: false
    results-per-scope: 5
    timeout-seconds: 15
    max-retries: 2

logging:
  level:
    root: INFO
    cn.bugstack.competitoragent: INFO
    com.microsoft.playwright: ERROR

---
# ==================== 生产环境配置 ====================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ragent}?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 20
      minimum-idle: 5
      pool-name: RagentHikariPool
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
