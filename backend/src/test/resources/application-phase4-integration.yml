spring:
  datasource:
    driver-class-name: org.h2.Driver
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:competitor-agent-phase4;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 4
      minimum-idle: 1
      pool-name: CompetitorAgentPhase4Pool
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      host: 127.0.0.1
      port: 16379
      database: 14
      timeout: 1s
  autoconfigure:
    exclude:
      - org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration

rocketmq:
  enabled: true
  required: true
  name-server: 127.0.0.1:9876
  producer:
    group: competitor-agent-workflow-producer-phase4
    send-message-timeout-millis: 3000
  consumer:
    group: competitor-agent-workflow-consumer-phase4
  workflow:
    topic: task-workflow-events-phase4
    dispatch-tag: TASK_EXECUTION_REQUESTED
    lifecycle-tag: NODE_LIFECYCLE
    outbox:
      scan-interval: 5s
      max-retries: 6
      batch-size: 20

logging:
  level:
    root: INFO
    cn.bugstack.competitoragent: INFO
    org.apache.rocketmq: WARN

search:
  source-catalog:
    families:
      github:
        # phase4 集成回归验证的是异步编排、动态补图与恢复语义，
        # 不要求真实 GitHub owner ready，因此显式关闭 family，避免被启动期 hard-fail 拦住。
        enabled: false
